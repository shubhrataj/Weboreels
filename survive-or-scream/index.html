<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>SURVIVE OR SCREAM</title>
<link href="https://fonts.googleapis.com/css2?family=Creepster&family=Special+Elite&family=Oswald:wght@300;400;700&display=swap" rel="stylesheet"/>
<style>
  :root {
    --blood: #8b0000;
    --blood-light: #c0392b;
    --fog: #1a1a2e;
    --shadow: #0d0d0d;
    --pale: #e8dcc8;
    --ghost: #a0a0b0;
    --gold: #c9a84c;
    --cyan-dark: #0a3d3d;
  }

  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 100%; min-height: 100vh;
    background: #000;
    font-family: 'Special Elite', serif;
    overflow-x: hidden;
    cursor: none;
  }

  #custom-cursor {
    position: fixed; width: 16px; height: 16px;
    border: 1.5px solid var(--blood-light);
    border-radius: 50%; pointer-events: none;
    z-index: 9999; transform: translate(-50%,-50%);
    transition: transform 0.1s, background 0.2s;
    mix-blend-mode: difference;
  }
  #custom-cursor.click { background: var(--blood-light); transform: translate(-50%,-50%) scale(1.8); }

  /* NOISE OVERLAY */
  body::before {
    content: '';
    position: fixed; inset: 0; z-index: 1;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none; opacity: 0.6;
  }

  /* BLOOD DRIP TOP */
  body::after {
    content: '';
    position: fixed; top: 0; left: 0; right: 0; height: 6px;
    background: var(--blood);
    box-shadow: 0 0 30px 8px rgba(139,0,0,0.5);
    z-index: 100;
  }

  /* SCREENS */
  .screen {
    position: fixed; inset: 0; z-index: 10;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 20px;
    opacity: 0; pointer-events: none;
    transition: opacity 0.8s ease;
  }
  .screen.active { opacity: 1; pointer-events: all; }

  /* ===== INTRO SCREEN ===== */
  #screen-intro { background: #000; }

  .flicker-bg {
    position: absolute; inset: 0;
    background: radial-gradient(ellipse at 50% 60%, #1a0a0a 0%, #000 70%);
    animation: flicker-bg 4s infinite;
  }
  @keyframes flicker-bg {
    0%,100%{opacity:1} 92%{opacity:1} 93%{opacity:0.7} 94%{opacity:1} 96%{opacity:0.85} 97%{opacity:1}
  }

  .intro-content { position: relative; z-index: 2; text-align: center; }

  .blood-title {
    font-family: 'Creepster', cursive;
    font-size: clamp(52px, 10vw, 96px);
    color: var(--blood-light);
    letter-spacing: 6px;
    text-shadow: 0 0 40px rgba(192,57,43,0.8), 0 0 80px rgba(139,0,0,0.4);
    animation: title-pulse 3s ease-in-out infinite;
    line-height: 1.1;
  }
  @keyframes title-pulse {
    0%,100%{text-shadow:0 0 40px rgba(192,57,43,0.8),0 0 80px rgba(139,0,0,0.4)}
    50%{text-shadow:0 0 60px rgba(192,57,43,1),0 0 120px rgba(139,0,0,0.7),0 0 160px rgba(139,0,0,0.2)}
  }

  .subtitle {
    font-family: 'Oswald', sans-serif;
    font-size: clamp(11px, 2vw, 15px);
    color: var(--ghost);
    letter-spacing: 6px;
    text-transform: uppercase;
    margin-top: 10px;
    margin-bottom: 60px;
    opacity: 0.7;
  }

  .typewriter-line {
    font-size: clamp(14px, 2.5vw, 18px);
    color: var(--pale);
    letter-spacing: 2px;
    min-height: 28px;
    margin-bottom: 50px;
    opacity: 0;
    animation: fadein 1s 1.5s forwards;
  }
  @keyframes fadein { to { opacity: 1; } }

  .heartbeat-ring {
    width: 80px; height: 80px;
    border-radius: 50%;
    border: 2px solid var(--blood);
    margin: 0 auto 40px;
    position: relative;
    animation: heartbeat 1.2s ease-in-out infinite;
  }
  .heartbeat-ring::after {
    content: '♥';
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 32px; color: var(--blood-light);
  }
  @keyframes heartbeat {
    0%,100%{transform:scale(1);box-shadow:0 0 0 0 rgba(139,0,0,0.4)}
    14%{transform:scale(1.1);box-shadow:0 0 0 10px rgba(139,0,0,0)}
    28%{transform:scale(1)}
    42%{transform:scale(1.08);box-shadow:0 0 0 6px rgba(139,0,0,0)}
    70%{transform:scale(1)}
  }

  .start-btn {
    font-family: 'Oswald', sans-serif;
    font-size: 14px; font-weight: 700;
    letter-spacing: 4px; text-transform: uppercase;
    color: var(--pale);
    background: transparent;
    border: 1px solid var(--blood);
    padding: 16px 48px;
    cursor: pointer;
    position: relative;
    overflow: hidden;
    transition: color 0.3s;
  }
  .start-btn::before {
    content: '';
    position: absolute; inset: 0;
    background: var(--blood);
    transform: scaleX(0); transform-origin: left;
    transition: transform 0.4s ease;
  }
  .start-btn:hover::before { transform: scaleX(1); }
  .start-btn:hover { color: #fff; }
  .start-btn span { position: relative; z-index: 1; }

  /* ===== QUESTION SCREEN ===== */
  #screen-question {
    background: #000;
    flex-direction: column;
  }

  .scene-bg {
    position: absolute; inset: 0;
    transition: background 1.2s ease, opacity 1s;
  }

  .progress-bar-wrap {
    position: absolute; top: 0; left: 0; right: 0; height: 3px;
    background: rgba(255,255,255,0.06); z-index: 20;
  }
  .progress-bar-fill {
    height: 100%; background: var(--blood);
    box-shadow: 0 0 10px var(--blood-light);
    transition: width 0.8s ease;
  }

  .scene-number {
    font-family: 'Oswald', sans-serif;
    font-size: 11px; letter-spacing: 4px;
    color: var(--ghost); opacity: 0.6;
    text-transform: uppercase;
    margin-bottom: 28px;
    position: relative; z-index: 5;
  }

  .scene-label {
    font-family: 'Creepster', cursive;
    font-size: clamp(20px, 4vw, 30px);
    color: var(--blood-light);
    letter-spacing: 3px;
    margin-bottom: 16px;
    position: relative; z-index: 5;
    text-align: center;
    text-shadow: 0 0 20px rgba(192,57,43,0.5);
  }

  .scene-desc {
    font-size: clamp(13px, 2.2vw, 16px);
    color: var(--ghost);
    text-align: center;
    line-height: 1.8;
    max-width: 560px;
    margin-bottom: 44px;
    position: relative; z-index: 5;
    font-style: italic;
    opacity: 0.85;
  }

  .question-text {
    font-family: 'Oswald', sans-serif;
    font-size: clamp(18px, 3.5vw, 26px);
    font-weight: 400;
    color: var(--pale);
    text-align: center;
    max-width: 600px;
    margin-bottom: 40px;
    position: relative; z-index: 5;
    letter-spacing: 1px;
    line-height: 1.5;
  }

  .choices-grid {
    display: flex; flex-direction: column; gap: 14px;
    width: 100%; max-width: 560px;
    position: relative; z-index: 5;
  }

  .choice-btn {
    font-family: 'Special Elite', serif;
    font-size: clamp(12px, 2vw, 15px);
    color: var(--pale);
    background: rgba(10,10,20,0.85);
    border: 1px solid rgba(139,0,0,0.35);
    padding: 18px 24px;
    cursor: pointer;
    text-align: left;
    letter-spacing: 0.5px;
    line-height: 1.6;
    transition: background 0.3s, border-color 0.3s, transform 0.2s, box-shadow 0.3s;
    position: relative; overflow: hidden;
  }
  .choice-btn::before {
    content: '';
    position: absolute; left: 0; top: 0; bottom: 0; width: 3px;
    background: var(--blood);
    transform: scaleY(0); transform-origin: bottom;
    transition: transform 0.3s;
  }
  .choice-btn:hover { border-color: var(--blood-light); background: rgba(139,0,0,0.15); transform: translateX(4px); box-shadow: -4px 0 20px rgba(139,0,0,0.2); }
  .choice-btn:hover::before { transform: scaleY(1); }
  .choice-btn .choice-key {
    font-family: 'Oswald', sans-serif;
    font-size: 10px; letter-spacing: 2px;
    color: var(--blood-light); margin-right: 12px; opacity: 0.8;
  }

  /* GLITCH EFFECT */
  .glitch {
    animation: glitch 0.3s steps(2) forwards;
  }
  @keyframes glitch {
    0%{transform:translate(0)} 20%{transform:translate(-3px,1px)} 40%{transform:translate(3px,-1px)} 60%{transform:translate(-2px,2px)} 80%{transform:translate(2px,-2px)} 100%{transform:translate(0)}
  }

  /* ===== RESULT SCREEN ===== */
  #screen-result { background: #000; }

  .result-bg {
    position: absolute; inset: 0;
    transition: background 1.5s ease;
  }

  .result-content {
    position: relative; z-index: 5;
    text-align: center; max-width: 680px;
    padding: 20px;
  }

  .fate-label {
    font-family: 'Oswald', sans-serif;
    font-size: 11px; letter-spacing: 6px;
    color: var(--ghost); opacity: 0.6;
    text-transform: uppercase; margin-bottom: 24px;
  }

  .result-title {
    font-family: 'Creepster', cursive;
    font-size: clamp(36px, 8vw, 72px);
    letter-spacing: 4px;
    line-height: 1.1;
    margin-bottom: 20px;
    text-shadow: 0 0 40px currentColor;
    animation: result-pulse 2s ease-in-out infinite;
  }
  @keyframes result-pulse {
    0%,100%{opacity:1} 50%{opacity:0.85}
  }

  .result-tagline {
    font-family: 'Oswald', sans-serif;
    font-size: clamp(13px, 2.5vw, 18px);
    font-weight: 300;
    color: var(--pale);
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-bottom: 32px;
    opacity: 0.8;
  }

  .result-desc {
    font-size: clamp(13px, 2vw, 16px);
    color: var(--ghost);
    line-height: 1.9;
    max-width: 520px;
    margin: 0 auto 48px;
    font-style: italic;
    opacity: 0.9;
  }

  .survival-meter {
    margin: 0 auto 36px;
    max-width: 320px;
  }
  .survival-meter-label {
    font-family: 'Oswald', sans-serif;
    font-size: 10px; letter-spacing: 3px;
    color: var(--ghost); opacity: 0.6;
    text-transform: uppercase; margin-bottom: 10px;
  }
  .survival-bar-track {
    height: 4px; background: rgba(255,255,255,0.08);
    position: relative;
  }
  .survival-bar-fill {
    height: 100%; width: 0%;
    transition: width 2s ease 0.5s;
    box-shadow: 0 0 10px currentColor;
  }

  .result-badge {
    font-size: 64px;
    margin-bottom: 20px;
    display: block;
    animation: badge-float 3s ease-in-out infinite;
  }
  @keyframes badge-float {
    0%,100%{transform:translateY(0)} 50%{transform:translateY(-10px)}
  }

  .restart-btn {
    font-family: 'Oswald', sans-serif;
    font-size: 13px; font-weight: 700;
    letter-spacing: 4px; text-transform: uppercase;
    color: var(--pale);
    background: transparent;
    border: 1px solid rgba(255,255,255,0.2);
    padding: 14px 40px;
    cursor: pointer;
    transition: border-color 0.3s, background 0.3s;
  }
  .restart-btn:hover { border-color: var(--pale); background: rgba(255,255,255,0.05); }

  /* TRANSITIONS */
  #transition-overlay {
    position: fixed; inset: 0; z-index: 500;
    background: #000; opacity: 0; pointer-events: none;
    transition: opacity 0.5s;
  }
  #transition-overlay.flash { opacity: 1; }

  /* SCANLINES */
  .scanlines {
    position: fixed; inset: 0; z-index: 2; pointer-events: none;
    background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.03) 2px, rgba(0,0,0,0.03) 4px);
  }

  /* VIGNETTE */
  .vignette {
    position: fixed; inset: 0; z-index: 3; pointer-events: none;
    background: radial-gradient(ellipse at center, transparent 50%, rgba(0,0,0,0.7) 100%);
  }

  /* TENSION INDICATOR */
  #tension-bar {
    position: fixed; right: 20px; top: 50%; transform: translateY(-50%);
    width: 3px; height: 120px; background: rgba(255,255,255,0.05);
    z-index: 50; display: none;
  }
  #tension-fill {
    width: 100%; height: 0%; background: var(--blood);
    position: absolute; bottom: 0;
    box-shadow: 0 0 8px var(--blood-light);
    transition: height 1s ease, background 0.5s;
  }

  /* AUDIO INDICATOR */
  #audio-hint {
    position: fixed; bottom: 20px; left: 50%;
    transform: translateX(-50%);
    font-family: 'Oswald', sans-serif;
    font-size: 9px; letter-spacing: 3px;
    color: var(--ghost); opacity: 0.4;
    text-transform: uppercase; z-index: 50;
    transition: opacity 0.5s;
  }

  @media (max-width: 600px) {
    .choices-grid { gap: 10px; }
    .choice-btn { padding: 14px 16px; }
  }
</style>
</head>
<body>

<div id="custom-cursor"></div>
<div class="scanlines"></div>
<div class="vignette"></div>
<div id="transition-overlay"></div>
<div id="tension-bar"><div id="tension-fill"></div></div>
<div id="audio-hint">♪ best experienced with headphones</div>

<!-- INTRO SCREEN -->
<div class="screen active" id="screen-intro">
  <div class="flicker-bg"></div>
  <div class="intro-content">
    <div class="heartbeat-ring"></div>
    <div class="blood-title">SURVIVE<br>OR SCREAM</div>
    <div class="subtitle">A horror survival test</div>
    <div class="typewriter-line" id="typewriter-line">You think you'd make it. Let's find out.</div>
    <button class="start-btn" onclick="beginExperience()"><span>▶ ENTER IF YOU DARE</span></button>
  </div>
</div>

<!-- QUESTION SCREEN -->
<div class="screen" id="screen-question">
  <div class="scene-bg" id="scene-bg"></div>
  <div class="progress-bar-wrap">
    <div class="progress-bar-fill" id="progress-fill" style="width:0%"></div>
  </div>
  <div class="scene-number" id="scene-number">SCENE 1 OF 6</div>
  <div class="scene-label" id="scene-label"></div>
  <div class="scene-desc" id="scene-desc"></div>
  <div class="question-text" id="question-text"></div>
  <div class="choices-grid" id="choices-grid"></div>
</div>

<!-- RESULT SCREEN -->
<div class="screen" id="screen-result">
  <div class="result-bg" id="result-bg"></div>
  <div class="result-content">
    <span class="result-badge" id="result-badge"></span>
    <div class="fate-label">YOUR FATE IS SEALED</div>
    <div class="result-title" id="result-title"></div>
    <div class="result-tagline" id="result-tagline"></div>
    <div class="survival-meter">
      <div class="survival-meter-label">Survival Probability</div>
      <div class="survival-bar-track">
        <div class="survival-bar-fill" id="survival-fill"></div>
      </div>
    </div>
    <div class="result-desc" id="result-desc"></div>
    <button class="restart-btn" onclick="restartExperience()">↺ FACE YOUR FATE AGAIN</button>
  </div>
</div>

<script>
// ─── CURSOR ───
const cur = document.getElementById('custom-cursor');
document.addEventListener('mousemove', e => {
  cur.style.left = e.clientX + 'px';
  cur.style.top = e.clientY + 'px';
});
document.addEventListener('mousedown', () => cur.classList.add('click'));
document.addEventListener('mouseup', () => cur.classList.remove('click'));

// ─── AUDIO ENGINE ───
let audioCtx = null;
let bgGain, tensionGain, masterGain;
let bgNodes = [], tensionNodes = [];

function initAudio() {
  if (audioCtx) return;
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  masterGain = audioCtx.createGain();
  masterGain.gain.value = 0.7;
  masterGain.connect(audioCtx.destination);

  bgGain = audioCtx.createGain();
  bgGain.gain.value = 0;
  bgGain.connect(masterGain);

  tensionGain = audioCtx.createGain();
  tensionGain.gain.value = 0;
  tensionGain.connect(masterGain);

  startAmbience();
}

function makeOsc(freq, type, gainNode, detune = 0) {
  const osc = audioCtx.createOscillator();
  const g = audioCtx.createGain();
  osc.type = type;
  osc.frequency.value = freq;
  osc.detune.value = detune;
  g.gain.value = 0.08;
  osc.connect(g);
  g.connect(gainNode);
  osc.start();
  return { osc, g };
}

function makeLFO(target, freq, depth) {
  const lfo = audioCtx.createOscillator();
  const lfoGain = audioCtx.createGain();
  lfo.frequency.value = freq;
  lfoGain.gain.value = depth;
  lfo.connect(lfoGain);
  lfoGain.connect(target);
  lfo.start();
  return lfo;
}

function startAmbience() {
  const drone1 = makeOsc(55, 'sawtooth', bgGain);
  const drone2 = makeOsc(55.3, 'sawtooth', bgGain, 8);
  const drone3 = makeOsc(110, 'sine', bgGain);
  const high = makeOsc(220, 'triangle', bgGain);
  high.g.gain.value = 0.03;

  makeLFO(drone1.osc.frequency, 0.08, 1.5);
  makeLFO(drone2.g.gain, 0.13, 0.04);

  const filter = audioCtx.createBiquadFilter();
  filter.type = 'lowpass';
  filter.frequency.value = 400;
  filter.Q.value = 8;

  bgGain.disconnect();
  bgGain.connect(filter);
  filter.connect(masterGain);

  makeLFO(filter.frequency, 0.04, 120);

  bgNodes = [drone1, drone2, drone3, high];

  bgGain.gain.setTargetAtTime(0.5, audioCtx.currentTime, 2);
}

function addTension(level) {
  if (!audioCtx) return;
  tensionGain.gain.setTargetAtTime(level * 0.25, audioCtx.currentTime, 1);
  tensionNodes.forEach(n => { try { n.osc.stop(); } catch(e){} });
  tensionNodes = [];
  if (level > 0.3) {
    const t1 = makeOsc(160 + level * 40, 'sawtooth', tensionGain);
    const t2 = makeOsc(163 + level * 40, 'sawtooth', tensionGain);
    t1.g.gain.value = 0.05;
    t2.g.gain.value = 0.05;
    makeLFO(t1.g.gain, 3 + level * 2, 0.03);
    tensionNodes = [t1, t2];
  }
}

function playHeartbeat() {
  if (!audioCtx) return;
  const t = audioCtx.currentTime;
  [0, 0.15, 0.8, 0.95].forEach((dt, i) => {
    const osc = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    osc.type = 'sine';
    osc.frequency.value = i % 2 === 0 ? 80 : 65;
    g.gain.setValueAtTime(0, t + dt);
    g.gain.linearRampToValueAtTime(0.4, t + dt + 0.02);
    g.gain.exponentialRampToValueAtTime(0.001, t + dt + 0.18);
    osc.connect(g); g.connect(masterGain);
    osc.start(t + dt); osc.stop(t + dt + 0.2);
  });
}

function playClickSound(type) {
  if (!audioCtx) return;
  const t = audioCtx.currentTime;
  if (type === 'brave') {
    const osc = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    osc.type = 'square'; osc.frequency.value = 200;
    g.gain.setValueAtTime(0.3, t);
    g.gain.exponentialRampToValueAtTime(0.001, t + 0.3);
    osc.connect(g); g.connect(masterGain);
    osc.start(t); osc.stop(t + 0.3);
  } else if (type === 'cautious') {
    const osc = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    osc.type = 'sine'; osc.frequency.value = 110;
    osc.frequency.exponentialRampToValueAtTime(55, t + 0.5);
    g.gain.setValueAtTime(0.2, t);
    g.gain.exponentialRampToValueAtTime(0.001, t + 0.5);
    osc.connect(g); g.connect(masterGain);
    osc.start(t); osc.stop(t + 0.5);
  } else {
    const buf = audioCtx.createBuffer(1, audioCtx.sampleRate * 0.2, audioCtx.sampleRate);
    const d = buf.getChannelData(0);
    for (let i = 0; i < d.length; i++) d[i] = (Math.random() * 2 - 1) * (1 - i / d.length);
    const src = audioCtx.createBufferSource();
    const g = audioCtx.createGain();
    g.gain.value = 0.15;
    src.buffer = buf; src.connect(g); g.connect(masterGain); src.start(t);
  }
}

function playResultReveal(resultType) {
  if (!audioCtx) return;
  const t = audioCtx.currentTime;
  const freqs = {
    protagonist: [261.6, 329.6, 392, 523.2],
    survivor:    [220, 261.6, 329.6, 440],
    wildcard:    [233.1, 277.2, 349.2, 466.2],
    victim:      [196, 220, 261.6, 311.1],
    strategist:  [246.9, 311.1, 392, 493.9],
    ghost:       [207.7, 246.9, 311.1, 415.3]
  };
  const chord = freqs[resultType] || freqs.survivor;
  chord.forEach((f, i) => {
    const osc = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    osc.type = 'triangle'; osc.frequency.value = f;
    g.gain.setValueAtTime(0, t + i * 0.15);
    g.gain.linearRampToValueAtTime(0.12, t + i * 0.15 + 0.1);
    g.gain.exponentialRampToValueAtTime(0.001, t + i * 0.15 + 2);
    osc.connect(g); g.connect(masterGain);
    osc.start(t + i * 0.15); osc.stop(t + i * 0.15 + 2.1);
  });
  bgGain.gain.setTargetAtTime(0.15, t, 2);
  tensionGain.gain.setTargetAtTime(0, t, 1.5);
}

// ─── QUESTIONS ───
const scenes = [
  {
    label: "THE NOISE",
    desc: "It's 2AM. Everyone's asleep. You hear something heavy dragging across the floor — coming from the basement.",
    question: "What do you do?",

// ─── STATE ───
let currentScene = 0;
let scores = { protagonist: 0, survivor: 0, strategist: 0, wildcard: 0, coward: 0, ghost: 0 };
let tension = 0;

const typeMap = {
  brave: 'protagonist',
  cautious: 'survivor',
  strategist: 'strategist',
  wildcard: 'wildcard',
  coward: 'coward',
  protagonist: 'protagonist',
  survivor: 'survivor'
};

function showScreen(id) {
  const overlay = document.getElementById('transition-overlay');
  overlay.classList.add('flash');
  setTimeout(() => {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    overlay.classList.remove('flash');
  }, 500);
}

function beginExperience() {
  initAudio();
  playHeartbeat();
  document.getElementById('tension-bar').style.display = 'block';
  setTimeout(() => {
    showScreen('screen-question');
    setTimeout(() => loadScene(0), 600);
  }, 300);
}

function loadScene(index) {
  const scene = scenes[index];
  tension = index / scenes.length;
  addTension(tension);

  document.getElementById('tension-fill').style.height = (tension * 100) + '%';
  document.getElementById('tension-fill').style.background = tension > 0.6 ? '#c0392b' : tension > 0.3 ? '#e67e22' : '#8b0000';
  document.getElementById('scene-bg').style.background = scene.bg;
  document.getElementById('progress-fill').style.width = ((index / scenes.length) * 100) + '%';
  document.getElementById('scene-number').textContent = `SCENE ${index + 1} OF ${scenes.length}`;
  document.getElementById('scene-label').textContent = scene.label;
  document.getElementById('scene-desc').textContent = scene.desc;
  document.getElementById('question-text').textContent = scene.question;

  const grid = document.getElementById('choices-grid');
  grid.innerHTML = '';
  const keys = ['A', 'B', 'C'];
  scene.choices.forEach((choice, i) => {
    const btn = document.createElement('button');
    btn.className = 'choice-btn';
    btn.innerHTML = `<span class="choice-key">${keys[i]}</span>${choice.text}`;
    btn.onclick = () => handleChoice(choice);
    grid.appendChild(btn);
  });

  if (index > 2) playHeartbeat();
}

function handleChoice(choice) {
  const key = typeMap[choice.type] || 'ghost';
  scores[key] = (scores[key] || 0) + 1;
  playClickSound(choice.sound);

  document.getElementById('scene-label').classList.add('glitch');
  setTimeout(() => document.getElementById('scene-label').classList.remove('glitch'), 300);

  currentScene++;
  if (currentScene >= scenes.length) {
    setTimeout(() => showResult(), 400);
  } else {
    showScreen('screen-question');
    setTimeout(() => loadScene(currentScene), 600);
  }
}

function showResult() {
  const winner = Object.entries(scores).sort((a, b) => b[1] - a[1])[0][0];
  const result = results[winner] || results.ghost;

  playResultReveal(winner);

  document.getElementById('result-bg').style.background = result.bg;
  document.getElementById('result-badge').textContent = result.badge;
  document.getElementById('result-title').textContent = result.title;
  document.getElementById('result-title').style.color = result.color;
  document.getElementById('result-tagline').textContent = result.tagline;
  document.getElementById('result-desc').textContent = result.desc;

  const fill = document.getElementById('survival-fill');
  fill.style.background = result.color;
  fill.style.color = result.color;

  document.getElementById('tension-bar').style.display = 'none';
  document.getElementById('progress-fill').style.width = '100%';

  showScreen('screen-result');
  setTimeout(() => {
    fill.style.width = result.survival + '%';
  }, 800);
}

function restartExperience() {
  currentScene = 0;
  scores = { protagonist: 0, survivor: 0, strategist: 0, wildcard: 0, coward: 0, ghost: 0 };
  tension = 0;
  addTension(0);
  document.getElementById('tension-bar').style.display = 'block';
  bgGain.gain.setTargetAtTime(0.5, audioCtx.currentTime, 1);
  showScreen('screen-question');
  setTimeout(() => loadScene(0), 600);
}

// Keyboard shortcuts
document.addEventListener('keydown', e => {
  if (document.getElementById('screen-question').classList.contains('active')) {
    const map = { 'a': 0, 'b': 1, 'c': 2, '1': 0, '2': 1, '3': 2 };
    const idx = map[e.key.toLowerCase()];
    if (idx !== undefined) {
      const btns = document.querySelectorAll('.choice-btn');
      if (btns[idx]) btns[idx].click();
    }
  }
  if (document.getElementById('screen-intro').classList.contains('active') && e.key === 'Enter') {
    beginExperience();
  }
});
